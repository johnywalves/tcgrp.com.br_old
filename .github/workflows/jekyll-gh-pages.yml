name: Deploy Jekyll site to Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

# Define as permissões necessárias para o token do GitHub Actions interagir com o GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Garante que builds simultâneos não se atropelem
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Job de Build
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2' # Versão recomendada para compatibilidade com seu ambiente
          bundler-cache: true # Faz o cache automático das suas gems para o build ser ultra rápido

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        # Compila o site usando o seu Gemfile local (Jekyll 4) em vez do Jekyll 3 legado da nuvem
        run: bundle exec jekyll build --baseurl "${{ steps: .pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  # Job de Deploy
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4